name: Release

# Push a version tag to trigger a full multi-platform build:
#   npm run release -- minor
#   git add -A && git commit -m "Release vX.Y.Z"
#   git tag vX.Y.Z && git push origin HEAD --tags
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # The release is tagged from the pushed git tag (see tauri-action below),
      # and the app reports its version from Cargo.toml (package.json is kept in
      # sync). Fail fast if those drift from the tag. tauri.conf.json carries no
      # version by design (it inherits from Cargo.toml), so it's only checked
      # when it actually declares one.
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          CARGO=$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          CONF=$(node -p "require('./src-tauri/tauri.conf.json').version || ''")
          echo "tag=$TAG  package.json=$PKG  Cargo.toml=$CARGO  tauri.conf.json=${CONF:-<inherits>}"
          for V in "$PKG" "$CARGO" "$CONF"; do
            if [ -n "$V" ] && [ "$V" != "$TAG" ]; then
              echo "::error::Version mismatch: pushed tag is v$TAG but a version file says $V. Run 'npm run release' so all version files match the tag, then retag."
              exit 1
            fi
          done

      # azalea requires nightly Rust. Keep this in sync with rust-toolchain.toml.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-15
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract release notes from changelog
        id: notes
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          {
            echo 'body<<__NOTES_EOF__'
            node scripts/extract-changelog.mjs "$VERSION"
            echo
            echo '__NOTES_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — set these in repo Settings → Secrets → Actions.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Use the exact pushed tag so the build always attaches to the right
          # release, independent of where the app version is declared.
          tagName: ${{ github.ref_name }}
          releaseName: "lodestone ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
